server:
  port: 8080

spring:
  application:
    name: api-gateway
  datasource:
    url: jdbc:postgresql://localhost:5432/gateway
    username: postgres
    password: postgres
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

logging:
  structured:
    format:
      console: ecs

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

springdoc:
  swagger-ui:
    path: /swagger-ui

app:
  security:
    jwt:
      # ponytail: demo-only static secret, plug-and-play per DESIGN §1; override JWT_SECRET for any non-demo use
      secret: ${JWT_SECRET:demo-only-insecure-jwt-signing-key-do-not-use-in-prod-9f3a7c}
      expiry-minutes: 15
  rate-limit:
    limit: 20
    window-seconds: 60
