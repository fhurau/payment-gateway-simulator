apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-processor
spec:
  replicas: 1
  selector:
    matchLabels: { app: payment-processor }
  template:
    metadata:
      labels: { app: payment-processor }
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do sleep 2; done
              until nc -z kafka 19092; do sleep 2; done
      containers:
        - name: payment-processor
          image: payment-gateway-simulator-payment-processor:latest
          imagePullPolicy: IfNotPresent
          env:
            - { name: SPRING_DATASOURCE_URL, value: "jdbc:postgresql://postgres:5432/processor" }
            - { name: SPRING_DATASOURCE_USERNAME, value: postgres }
            - { name: SPRING_DATASOURCE_PASSWORD, value: postgres }
            - { name: SPRING_KAFKA_BOOTSTRAP_SERVERS, value: "kafka:19092" }
          ports:
            - containerPort: 8081
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8081 }
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 20
---
apiVersion: v1
kind: Service
metadata:
  name: payment-processor
spec:
  selector: { app: payment-processor }
  ports:
    - port: 8081
      targetPort: 8081
