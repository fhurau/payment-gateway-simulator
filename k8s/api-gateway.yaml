apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels: { app: api-gateway }
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do sleep 2; done
              until nc -z redis 6379; do sleep 2; done
              until nc -z kafka 19092; do sleep 2; done
      containers:
        - name: api-gateway
          image: payment-gateway-simulator-api-gateway:latest
          imagePullPolicy: IfNotPresent
          env:
            - { name: SPRING_DATASOURCE_URL, value: "jdbc:postgresql://postgres:5432/gateway" }
            - { name: SPRING_DATASOURCE_USERNAME, value: postgres }
            - { name: SPRING_DATASOURCE_PASSWORD, value: postgres }
            - { name: SPRING_DATA_REDIS_HOST, value: redis }
            - { name: SPRING_KAFKA_BOOTSTRAP_SERVERS, value: "kafka:19092" }
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector: { app: api-gateway }
  ports:
    - port: 8080
      targetPort: 8080
